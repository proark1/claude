name: Deploy Zero to Launched to GitHub Pages

# Publishes the static site in zero-to-launched/ to GitHub Pages.
# Requires: repo Settings → Pages → Build and deployment → Source = "GitHub Actions".
on:
  push:
    branches: [main]
    paths:
      - "zero-to-launched/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; newer runs supersede queued ones.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Upload site (zero-to-launched/)
        uses: actions/upload-pages-artifact@v3
        with:
          path: zero-to-launched
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
